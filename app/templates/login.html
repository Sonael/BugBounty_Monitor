{% extends "base.html" %}

{% block content %}
<div class="login-container">
    <div class="card login-card shadow">
        <div class="card-body">
            <!-- Header Section -->
            <header class="text-center mb-4">
                <div class="mb-3">
                    <i class="fas fa-user-shield fa-3x text-primary" aria-hidden="true"></i>
                </div>
                <h1 class="h3 mb-0">Acesso ao Sistema</h1>
                <p class="text-muted small mt-2">Entre com suas credenciais para continuar</p>
            </header>

            <!-- Login Form -->
            <form method="POST" action="{{ url_for('main.login_post') }}" novalidate>
                <div class="mb-3">
                    <label for="username" class="form-label fw-bold">
                        Usuário
                        <span class="text-danger" aria-label="campo obrigatório">*</span>
                    </label>
                    <div class="input-group">
                        <span class="input-group-text bg-light">
                            <i class="fas fa-user" aria-hidden="true"></i>
                        </span>
                        <input 
                            type="text" 
                            class="form-control" 
                            id="username" 
                            name="username" 
                            required 
                            autocomplete="username"
                            placeholder="Seu usuário"
                            aria-required="true">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label fw-bold">
                        Senha
                        <span class="text-danger" aria-label="campo obrigatório">*</span>
                    </label>
                    <div class="input-group">
                        <span class="input-group-text bg-light">
                            <i class="fas fa-lock" aria-hidden="true"></i>
                        </span>
                        <input 
                            type="password" 
                            class="form-control" 
                            id="password" 
                            name="password" 
                            required 
                            autocomplete="current-password"
                            placeholder="Sua senha"
                            aria-required="true">
                    </div>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg fw-bold">
                        <i class="fas fa-sign-in-alt me-2" aria-hidden="true"></i>
                        Entrar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
